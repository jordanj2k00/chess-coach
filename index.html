<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>

<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div class="container">

<div>
<div id="board"></div>

<button onclick="resetGame()">Reset Game</button>
<button onclick="startOpeningTrainer()">Opening Trainer</button>
<button onclick="clearStats()">Clear Stats</button>
</div>

<div class="panel">

<h2>Status</h2>
<div id="status">White to Move</div>

<h2>Coach</h2>
<div id="coach">Welcome.</div>

<h2>Progress</h2>
<div id="progress"></div>

<h2>Move History</h2>
<div id="history"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
