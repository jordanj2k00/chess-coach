<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:gold;
}

#board{
display:grid;
grid-template-columns:repeat(8,60px);
justify-content:center;
margin:20px auto;
width:480px;
}

.square{
width:60px;
height:60px;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

.selected{
outline:3px solid yellow;
}

#status{
margin-top:20px;
font-size:20px;
color:gold;
}

button{
padding:10px 20px;
background:gold;
border:none;
font-weight:bold;
margin-top:20px;
border-radius:8px;
}
</style>
</head>
<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div id="board"></div>

<div id="status">White to Move</div>

<button onclick="resetGame()">Reset Game</button>

<script>
const chess = new Chess();

let selectedSquare=null;

const pieceMap = {
'p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚',
'P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔'
};

function renderBoard(){
const board=document.getElementById("board");
board.innerHTML="";

const currentBoard=chess.board();

for(let row=0;row<8;row++){
for(let col=0;col<8;col++){

const square=document.createElement("div");

square.classList.add("square");
square.classList.add((row+col)%2===0?"light":"dark");

const piece=currentBoard[row][col];

if(piece){
square.textContent=pieceMap[piece.color==="w"
?piece.type.toUpperCase()
:piece.type];
}

square.onclick=()=>handleClick(row,col);

board.appendChild(square);

}
}

updateStatus();
}

function coordsToSquare(row,col){
return "abcdefgh"[col]+(8-row);
}

function handleClick(row,col){
const square=coordsToSquare(row,col);

if(selectedSquare===null){
selectedSquare=square;
}
else{

const move=chess.move({
from:selectedSquare,
to:square,
promotion:'q'
});

if(move){
selectedSquare=null;
renderBoard();

if(chess.in_checkmate()){
document.getElementById("status").innerText="CHECKMATE!";
}
else if(chess.in_check()){
document.getElementById("status").innerText="CHECK!";
}
}
else{
selectedSquare=null;
}
}

renderBoard();
}

function updateStatus(){
document.getElementById("status").innerText=
chess.turn()==='w'
?"White to Move"
:"Black to Move";
}

function resetGame(){
chess.reset();
renderBoard();
}

renderBoard();
</script>

</body>
</html>
