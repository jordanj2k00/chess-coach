<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
margin:0;
}

h1{
color:gold;
font-size:42px;
}

#board{
display:grid;
grid-template-columns:repeat(8,1fr);
width:90vw;
max-width:480px;
margin:20px auto;
border:4px solid gold;
}

.square{
aspect-ratio:1/1;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
cursor:pointer;
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.selected{
outline:4px solid yellow;
}

#status{
margin-top:20px;
font-size:28px;
color:gold;
}

button{
padding:12px 24px;
background:gold;
border:none;
font-weight:bold;
margin-top:20px;
border-radius:8px;
font-size:20px;
}
</style>
</head>

<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div id="board"></div>

<div id="status">White to Move</div>

<button onclick="resetGame()">Reset Game</button>

<script>

const startBoard = [
['♜','♞','♝','♛','♚','♝','♞','♜'],
['♟','♟','♟','♟','♟','♟','♟','♟'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['♙','♙','♙','♙','♙','♙','♙','♙'],
['♖','♘','♗','♕','♔','♗','♘','♖']
];

let board = JSON.parse(JSON.stringify(startBoard));
let selected = null;
let turn = "white";

function renderBoard(){
const boardDiv = document.getElementById("board");
boardDiv.innerHTML = "";

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

const square = document.createElement("div");

square.classList.add("square");
square.classList.add((r+c)%2===0 ? "light" : "dark");

if(selected && selected.r===r && selected.c===c){
square.classList.add("selected");
}

square.textContent = board[r][c];

square.onclick = ()=>handleClick(r,c);

boardDiv.appendChild(square);

}
}

document.getElementById("status").innerText =
turn==="white" ? "White to Move" : "Black to Move";
}

function isWhitePiece(piece){
return "♙♖♘♗♕♔".includes(piece);
}

function isBlackPiece(piece){
return "♟♜♞♝♛♚".includes(piece);
}

function validTurn(piece){
if(turn==="white") return isWhitePiece(piece);
return isBlackPiece(piece);
}

function handleClick(r,c){

const piece = board[r][c];

if(selected===null){

if(piece && validTurn(piece)){
selected={r,c};
}

}else{

if(validMove(selected.r,selected.c,r,c)){

board[r][c]=board[selected.r][selected.c];
board[selected.r][selected.c]="";

turn = turn==="white" ? "black" : "white";

}

selected=null;

}

renderBoard();

}

function validMove(sr,sc,tr,tc){

const piece = board[sr][sc];

if(!piece) return false;

const dr = tr-sr;
const dc = tc-sc;

if(piece==="♙") return dc===0 && dr===-1;
if(piece==="♟") return dc===0 && dr===1;

if(piece==="♖"||piece==="♜"){
return sr===tr || sc===tc;
}

if(piece==="♗"||piece==="♝"){
return Math.abs(dr)===Math.abs(dc);
}

if(piece==="♕"||piece==="♛"){
return sr===tr || sc===tc || Math.abs(dr)===Math.abs(dc);
}

if(piece==="♔"||piece==="♚"){
return Math.abs(dr)<=1 && Math.abs(dc)<=1;
}

if(piece==="♘"||piece==="♞"){
return (
(Math.abs(dr)===2 && Math.abs(dc)===1) ||
(Math.abs(dr)===1 && Math.abs(dc)===2)
);
}

return false;

}

function resetGame(){

board = JSON.parse(JSON.stringify(startBoard));

selected = null;

turn = "white";

renderBoard();

}

renderBoard();

</script>

</body>
</html>
