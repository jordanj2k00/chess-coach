<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Grave Chess Coach</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:white}
header{padding:20px;text-align:center;background:#111827;font-size:28px;font-weight:bold;color:#facc15}
.container{display:grid;grid-template-columns:2fr 1fr;gap:20px;padding:20px}
#board{display:grid;grid-template-columns:repeat(8,70px);width:560px;border:4px solid #333}
.square{width:70px;height:70px;display:flex;align-items:center;justify-content:center;font-size:42px;cursor:pointer}
.light{background:#f0d9b5;color:black}.dark{background:#b58863}
.panel{background:#1e293b;padding:20px;border-radius:12px}
button{padding:10px 15px;margin:5px;background:#facc15;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
button:hover{background:#fde047}
#coach,#history,#openingBox{margin-top:10px;line-height:1.6;color:#cbd5e1}
</style>
</head>
<body>
<header>тЩЯ LIQUID GRAVE CHESS COACH</header>
<div class="container">
<div>
<div id="board"></div>
<div>
<button onclick="resetBoard()">Reset</button>
<button onclick="undoMove()">Undo</button>
<button onclick="openingTrainer()">Train Opening</button>
<button onclick="analyzeGame()">Analyze</button>
</div>
</div>
<div class="panel">
<h2>Coach</h2>
<div id="coach">Welcome, Von. Ready to sharpen your game.</div>
<h2>Move History</h2>
<div id="history"></div>
<h2>Opening Trainer</h2>
<div id="openingBox">No opening selected.</div>
</div>
</div>
<script>
const startBoard=[
['тЩЬ','тЩЮ','тЩЭ','тЩЫ','тЩЪ','тЩЭ','тЩЮ','тЩЬ'],
['тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ'],
['тЩЦ','тЩШ','тЩЧ','тЩХ','тЩФ','тЩЧ','тЩШ','тЩЦ']
];
let board=JSON.parse(JSON.stringify(startBoard));
let selected=null;
let history=[];
function renderBoard(){
const el=document.getElementById('board');
el.innerHTML='';
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const sq=document.createElement('div');
sq.className='square '+((r+c)%2===0?'light':'dark');
sq.textContent=board[r][c];
sq.onclick=()=>movePiece(r,c);
el.appendChild(sq);
}}
renderHistory();
}
function movePiece(r,c){
if(selected){
history.push(JSON.parse(JSON.stringify(board)));
board[r][c]=board[selected.r][selected.c];
board[selected.r][selected.c]='';
selected=null;
coachFeedback();
renderBoard();
}else if(board[r][c]!==""){
selected={r,c};
}}
function resetBoard(){board=JSON.parse(JSON.stringify(startBoard));history=[];renderBoard();document.getElementById('coach').innerText='Board reset. Focus on center control.';}
function undoMove(){if(history.length){board=history.pop();renderBoard();}}
function renderHistory(){document.getElementById('history').innerHTML=history.map((_,i)=>'Move '+(i+1)).join('<br>');}
function coachFeedback(){
const tips=[
'Good. Always ask what your opponent wants next.',
'Develop your knights before bishops in most positions.',
'Fight for the center early with pawns.',
'Castle before launching an attack.',
'Improve your worst piece each turn.'
];
document.getElementById('coach').innerText=tips[Math.floor(Math.random()*tips.length)];
}
function openingTrainer(){
const openings=[
'Four Knights Scotch: 1.e4 e5 2.Nf3 Nc6 3.Nc3 Nf6 4.d4',
'Halloween Gambit: 1.e4 e5 2.Nf3 Nc6 3.Nc3 Nf6 4.Nxe5!?',
'Grand Prix Attack: 1.e4 c5 2.Nc3 Nc6 3.f4',
'Kings Indian Defense: 1.d4 Nf6 2.c4 g6 3.Nc3 Bg7',
'Alekhine Defense: 1.e4 Nf6 2.e5 Nd5'
];
document.getElementById('openingBox').innerText=openings[Math.floor(Math.random()*openings.length)];
}
function analyzeGame(){
let pieces=0;
for(let row of board){for(let sq of row){if(sq!=='')pieces++;}}
document.getElementById('coach').innerText='Analysis: '+pieces+' pieces remain. Focus on king safety, active pieces, and center control.';
}
renderBoard();
</script>
</body>
</html>
