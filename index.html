<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
margin:0;
}

h1{
color:gold;
font-size:42px;
}

#board{
display:grid;
grid-template-columns:repeat(8,1fr);
width:90vw;
max-width:480px;
margin:20px auto;
border:4px solid gold;
}

.square{
aspect-ratio:1/1;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:38px;
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.selected{
outline:4px solid yellow;
}

#status{
margin-top:20px;
font-size:28px;
color:gold;
}

button{
padding:12px 24px;
background:gold;
border:none;
font-weight:bold;
margin-top:20px;
border-radius:8px;
font-size:20px;
}

.white{
color:white;
text-shadow:2px 2px 4px black;
}

.black{
color:black;
text-shadow:1px 1px 2px white;
}
</style>
</head>

<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div id="board"></div>

<div id="status">White to Move</div>

<button onclick="resetGame()">Reset Game</button>

<script>

const startBoard = [
['br','bn','bb','bq','bk','bb','bn','br'],
['bp','bp','bp','bp','bp','bp','bp','bp'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['wp','wp','wp','wp','wp','wp','wp','wp'],
['wr','wn','wb','wq','wk','wb','wn','wr']
];

const pieces = {
wp:'♙', wr:'♖', wn:'♘', wb:'♗', wq:'♕', wk:'♔',
bp:'♟', br:'♜', bn:'♞', bb:'♝', bq:'♛', bk:'♚'
};

let board = JSON.parse(JSON.stringify(startBoard));
let selected = null;
let turn = "white";

function renderBoard(){
const boardDiv = document.getElementById("board");
boardDiv.innerHTML="";

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

const square=document.createElement("div");

square.classList.add("square");
square.classList.add((r+c)%2===0?"light":"dark");

if(selected && selected.r===r && selected.c===c){
square.classList.add("selected");
}

const piece=board[r][c];

if(piece){
square.textContent=pieces[piece];

if(piece[0]==='w'){
square.classList.add("white");
}else{
square.classList.add("black");
}
}

square.onclick=()=>handleClick(r,c);

boardDiv.appendChild(square);

}
}

document.getElementById("status").innerText=
turn==="white"?"White to Move":"Black to Move";
}

function validTurn(piece){
if(turn==="white") return piece[0]==='w';
return piece[0]==='b';
}

function handleClick(r,c){

const piece=board[r][c];

if(selected===null){

if(piece && validTurn(piece)){
selected={r,c};
}

}else{

board[r][c]=board[selected.r][selected.c];
board[selected.r][selected.c]="";

turn=turn==="white"?"black":"white";

selected=null;

}

renderBoard();

}

function resetGame(){
board=JSON.parse(JSON.stringify(startBoard));
selected=null;
turn="white";
renderBoard();
}

renderBoard();

</script>

</body>
</html>
