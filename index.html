<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Grave Chess Coach V3</title>
<style>
body{margin:0;background:#071226;color:white;font-family:Arial,sans-serif;padding:20px}
h1{text-align:center;color:#facc15;margin-bottom:20px}
.container{display:flex;gap:30px;justify-content:center;flex-wrap:wrap}
#board{display:grid;grid-template-columns:repeat(8,70px);border:4px solid #333}
.square{width:70px;height:70px;display:flex;align-items:center;justify-content:center;font-size:42px;cursor:pointer}
.light{background:#f0d9b5}.dark{background:#b58863}
.white-piece{color:#fff;text-shadow:0 0 3px #000}
.black-piece{color:#000;text-shadow:0 0 3px #fff}
.panel{background:#1e293b;padding:20px;border-radius:15px;width:280px}
button{padding:10px 15px;margin:5px;background:#facc15;border:none;border-radius:8px;font-weight:bold}
</style>
</head>
<body>
<h1>♟ LIQUID GRAVE CHESS COACH</h1>
<div class="container">
<div>
<div id="board"></div>
<button onclick="resetBoard()">Reset</button>
<button onclick="undoMove()">Undo</button>
</div>
<div class="panel">
<h2>Coach</h2>
<div id="coach">Ready for battle.</div>
</div>
</div>
<script>
const startingBoard=[
['const startingBoard = [
['♜','♞','♝','♛','♚','♝','♞','♜'],
['♟','♟','♟','♟','♟','♟','♟','♟'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['♙','♙','♙','♙','♙','♙','♙','♙'],
['♖','♘','♗','♕','♔','♗','♘','♖']
];
];
let board=JSON.parse(JSON.stringify(startingBoard));
let history=[];
let selected=null;
function renderBoard(){
const el=document.getElementById('board');
el.innerHTML='';
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const sq=document.createElement('div');
sq.className='square '+((r+c)%2===0?'light':'dark');
let piece=board[r][c];
if(piece){
const span=document.createElement('span');
span.textContent=piece;
if(['♜','♞','♝','♛','♚','♟'].includes(piece)) span.className='black-piece';
else span.className='white-piece';
sq.appendChild(span);
}
sq.onclick=()=>movePiece(r,c);
el.appendChild(sq);
}}
}
function movePiece(r,c){
if(selected){
history.push(JSON.parse(JSON.stringify(board)));
board[r][c]=board[selected.r][selected.c];
board[selected.r][selected.c]='';
selected=null;
renderBoard();
}else if(board[r][c]!==''){
selected={r,c};
}}
function resetBoard(){board=JSON.parse(JSON.stringify(startingBoard));renderBoard();}
function undoMove(){if(history.length){board=history.pop();renderBoard();}}
renderBoard();
</script>
</body>
</html>
