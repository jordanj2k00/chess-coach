<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}
h1{
text-align:center;
color:gold;
font-size:42px;
}
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}
#board{
display:grid;
grid-template-columns:repeat(8,1fr);
width:90vw;
max-width:480px;
border:4px solid gold;
}
.square{
aspect-ratio:1/1;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
cursor:pointer;
position:relative;
}
.light{background:#f0d9b5;}
.dark{background:#b58863;}
.selected{outline:4px solid yellow;}
.legal::after{
content:'';
width:15px;
height:15px;
background:lime;
border-radius:50%;
position:absolute;
}
.white{
color:white;
text-shadow:2px 2px 4px black;
}
.black{
color:black;
text-shadow:1px 1px 2px white;
}
.panel{
background:#1a2238;
padding:20px;
border-radius:10px;
width:250px;
}
button{
padding:12px 24px;
background:gold;
border:none;
font-weight:bold;
margin-top:20px;
border-radius:8px;
font-size:20px;
width:100%;
}
</style>
</head>

<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div class="container">

<div>
<div id="board"></div>
<button onclick="resetGame()">Reset Game</button>
<button onclick="startOpeningTrainer()">Opening Trainer</button>
</div>

<div class="panel">
<h2>Status</h2>
<div id="status">White to Move</div>

<h2>Coach</h2>
<div id="coach">Welcome.</div>

<h2>Move History</h2>
<div id="history"></div>
</div>

</div>

<script>

const chess = new Chess();

const pieces={
'p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚',
'P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔'
};

let selected=null;
let trainerMode=false;

let openingTree={};
let currentNode=null;

const repertoire={

fourKnights:{
move:"e4",
responses:{
"e5":{
move:"Nf3",
responses:{
"Nc6":{
move:"Nc3",
responses:{
"Nf6":{
options:["d4","Bb5","g3"]
}
}
}
}
}
}

};

function renderBoard(){

const boardDiv=document.getElementById("board");
boardDiv.innerHTML="";

const currentBoard=chess.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

const square=document.createElement("div");
square.classList.add("square");
square.classList.add((r+c)%2===0?"light":"dark");

const piece=currentBoard[r][c];

if(piece){

square.textContent=
pieces[piece.color==="w"
?piece.type.toUpperCase()
:piece.type];

square.classList.add(piece.color==="w"?"white":"black");

}

if(selected&&selected.r===r&&selected.c===c){
square.classList.add("selected");
}

if(selected){

const moves=chess.moves({
square:toSquare(selected.r,selected.c),
verbose:true
});

if(moves.some(m=>m.to===toSquare(r,c))){
square.classList.add("legal");
}

}

square.onclick=()=>handleClick(r,c);

boardDiv.appendChild(square);

}
}

updateStatus();

document.getElementById("history").innerHTML=
chess.history().join("<br>");

}

function toSquare(r,c){
return "abcdefgh"[c]+(8-r);
}

function handleClick(r,c){

const clickedSquare=toSquare(r,c);

if(selected===null){

const piece=chess.get(clickedSquare);

if(piece&&piece.color==="w"){
selected={r,c};
}

}else{

const move=chess.move({
from:toSquare(selected.r,selected.c),
to:clickedSquare,
promotion:'q'
});

selected=null;

if(move){

if(trainerMode){

handleTrainerMove(move.san);

}else{

if(!chess.game_over()){
setTimeout(aiMove,500);
}

}

}

renderBoard();

}

}

function handleTrainerMove(san){

if(currentNode.move===san){

document.getElementById("coach").innerText=
"Correct. "+san+" played well.";

currentNode=currentNode.responses;

let enemyMove=Object.keys(currentNode)[0];

if(enemyMove){

setTimeout(()=>{

chess.move(enemyMove);

currentNode=currentNode[enemyMove];

renderBoard();

},500);

}

}
else if(currentNode.options&&currentNode.options.includes(san)){

document.getElementById("coach").innerText=
"Excellent. Variation accepted.";

trainerMode=false;

}
else{

document.getElementById("coach").innerText=
"Incorrect. Try again.";

chess.undo();

}

}

function aiMove(){

const moves=chess.moves();

if(moves.length===0)return;

const randomMove=
moves[Math.floor(Math.random()*moves.length)];

chess.move(randomMove);

renderBoard();

}

function updateStatus(){

let status="";

if(chess.in_checkmate()){

status="CHECKMATE";

}
else if(chess.in_check()){

status="CHECK";

}
else if(trainerMode===false&&document.getElementById("coach").innerText==="Excellent. Variation accepted."){

status="Training Complete";

}
else{

status=
chess.turn()==="w"
?"White to Move"
:"Black Thinking";

}

document.getElementById("status").innerText=status;

}

function resetGame(){

chess.reset();

selected=null;
trainerMode=false;

document.getElementById("coach").innerText="Reset.";

renderBoard();

}

function startOpeningTrainer(){

resetGame();

trainerMode=true;

openingTree=repertoire.fourKnights;

currentNode=openingTree;

document.getElementById("coach").innerText=
"Four Knights Trainer Started";

}

renderBoard();

</script>

</body>
</html>
