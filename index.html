<!DOCTYPE html>
<html>
<head>
<title>Liquid Grave Chess Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:gold;
font-size:42px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

#board{
display:grid;
grid-template-columns:repeat(8,1fr);
width:90vw;
max-width:480px;
border:4px solid gold;
}

.square{
aspect-ratio:1/1;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
cursor:pointer;
position:relative;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

.selected{
outline:4px solid yellow;
}

.legal::after{
content:'';
width:15px;
height:15px;
background:lime;
border-radius:50%;
position:absolute;
}

.white{
color:white;
text-shadow:2px 2px 4px black;
}

.black{
color:black;
text-shadow:1px 1px 2px white;
}

.panel{
background:#1a2238;
padding:20px;
border-radius:10px;
width:250px;
}

button{
padding:12px 24px;
background:gold;
border:none;
font-weight:bold;
margin-top:20px;
border-radius:8px;
font-size:20px;
width:100%;
}
</style>
</head>

<body>

<h1>♟ Liquid Grave Chess Coach</h1>

<div class="container">

<div>
<div id="board"></div>

<button onclick="resetGame()">Reset Game</button>

<button onclick="startOpeningTrainer()">Opening Trainer</button>
</div>

<div class="panel">

<h2>Status</h2>
<div id="status">White to Move</div>

<h2>Coach</h2>
<div id="coach">Welcome.</div>

<h2>Move History</h2>
<div id="history"></div>

</div>

</div>

<script>

const chess = new Chess();

const pieces = {
'p':'♟','r':'♜','n':'♞','b':'♝','q':'♛','k':'♚',
'P':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔'
};

let selected=null;
let trainerMode=false;
let trainerIndex=0;
let currentOpening=[];
let currentExplanations=[];

const openings={

1:[
"e4","e5","Nf3","Nc6","Nc3","Nf6","d4","exd4","Nxd4"
],

2:[
"e4","e5","Nf3","Nc6","Nc3","Nf6","Nxe5"
],

3:[
"d4","Nf6","c4","g6","Nc3","Bg7"
],

4:[
"e4","Nf6","e5","Nd5","d4"
]

};

const explanations={

"e4":"Controls the center and opens lines for your bishop and queen.",
"e5":"Black mirrors your center control.",
"Nf3":"Develops your knight and attacks the e5 pawn.",
"Nc6":"Black defends the e5 pawn while developing.",
"Nc3":"Develops another knight toward the center.",
"Nf6":"Black develops and pressures e4.",
"d4":"Challenges the center and begins the Scotch structure.",
"exd4":"Black accepts the center tension.",
"Nxd4":"Recaptures and centralizes your knight.",
"Nxe5":"The Halloween Gambit sacrifices a knight for rapid attack.",
"g6":"Preparing kingside fianchetto for King's Indian.",
"Bg7":"Strong bishop on long diagonal.",
"Nd5":"Alekhine retreats while baiting overextension."
};

function renderBoard(){

const boardDiv=document.getElementById("board");
boardDiv.innerHTML="";

const currentBoard=chess.board();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

const square=document.createElement("div");

square.classList.add("square");
square.classList.add((r+c)%2===0?"light":"dark");

const piece=currentBoard[r][c];

if(piece){

square.textContent=
pieces[piece.color==="w"
?piece.type.toUpperCase()
:piece.type];

square.classList.add(
piece.color==="w"?"white":"black"
);

}

if(selected&&selected.r===r&&selected.c===c){
square.classList.add("selected");
}

if(selected){

const moves=chess.moves({
square:toSquare(selected.r,selected.c),
verbose:true
});

if(moves.some(m=>m.to===toSquare(r,c))){
square.classList.add("legal");
}

}

square.onclick=()=>handleClick(r,c);

boardDiv.appendChild(square);

}
}

updateStatus();

document.getElementById("history").innerHTML=
chess.history().join("<br>");

}

function toSquare(r,c){
return "abcdefgh"[c]+(8-r);
}

function handleClick(r,c){

const clickedSquare=toSquare(r,c);

if(selected===null){

const piece=chess.get(clickedSquare);

if(piece&&piece.color==="w"){
selected={r,c};
}

}else{

const move=chess.move({
from:toSquare(selected.r,selected.c),
to:clickedSquare,
promotion:'q'
});

selected=null;

if(move){

if(trainerMode){

if(move.san===currentOpening[trainerIndex]){

document.getElementById("coach").innerText=
explanations[move.san]||"Correct.";

trainerIndex++;

if(trainerIndex<currentOpening.length){

setTimeout(()=>{

let nextMove=currentOpening[trainerIndex];

chess.move(nextMove);

trainerIndex++;

renderBoard();

if(trainerIndex>=currentOpening.length){

document.getElementById("coach").innerText=
"Opening Complete!";

}

},500);

}else{

document.getElementById("coach").innerText=
"Opening Complete!";

}

}else{

document.getElementById("coach").innerText=
"Wrong Move.\nExpected: "+currentOpening[trainerIndex];

chess.undo();

}

}else{

renderBoard();

if(!chess.game_over()){
setTimeout(aiMove,500);
return;
}

}

}

renderBoard();

}

}

function aiMove(){

const moves=chess.moves();

if(moves.length===0)return;

const randomMove=
moves[Math.floor(Math.random()*moves.length)];

chess.move(randomMove);

renderBoard();

}

function updateStatus(){

let status="";

if(chess.in_checkmate()){
status="CHECKMATE";
}

else if(chess.in_check()){
status="CHECK";
}

else{
status=
chess.turn()==="w"
?"White to Move"
:"Black Thinking";
}

document.getElementById("status").innerText=status;

}

function resetGame(){

chess.reset();

selected=null;
trainerMode=false;
trainerIndex=0;

document.getElementById("coach").innerText="Reset.";

renderBoard();

}

function startOpeningTrainer(){

resetGame();

let choice=prompt(
"Choose Opening:\n\n1 = Four Knights Scotch\n2 = Halloween Gambit\n3 = King's Indian Defense\n4 = Alekhine Defense"
);

if(!openings[choice]) return;

currentOpening=openings[choice];

trainerMode=true;

trainerIndex=0;

document.getElementById("coach").innerText=
"Training Started.";

}

renderBoard();

</script>

</body>
</html>
